name: Android CI (Build APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init

    - name: Clone AndroidLibXrayLite
      run: |
        git clone --depth=1 https://github.com/2dust/AndroidLibXrayLite.git AndroidLibXrayLite

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        build-tools: 36.0.0

    - name: Install Android SDK 36
      run: |
        sdkmanager "platforms;android-36"
        sdkmanager "build-tools;36.0.0"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Create .env from example
      run: |
        cp .env.example .env || true

    - name: Build libv2ray.aar
      run: |
        cd AndroidLibXrayLite
        go mod tidy
        gomobile bind -v -androidapi 24 -o ../app/libs/libv2ray.aar ./libv2ray
        cd ..

    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
